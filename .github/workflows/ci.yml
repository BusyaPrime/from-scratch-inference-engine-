name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-cpu:
    name: linux-cpu (clang, Release)
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang clang-format clang-tidy ninja-build libopenblas-dev
          clang --version
          cmake --version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure
        run: cmake --preset linux-cpu-release

      - name: Build
        run: cmake --build --preset linux-cpu-release

      - name: C++ tests (ctest)
        run: ctest --preset linux-cpu-release

      - name: Editable install and Python tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest tests/python -v

      - name: clang-format (check)
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.cc' '*.cxx' '*.h' '*.hpp' '*.cu' '*.cuh')
          if [ "${#files[@]}" -gt 0 ]; then clang-format --dry-run --Werror "${files[@]}"; fi

      - name: clang-tidy (advisory)
        continue-on-error: true
        run: |
          mapfile -t files < <(git ls-files '*.cpp' | grep -E '^(src|bindings|kernels/cpu)/' || true)
          if [ "${#files[@]}" -gt 0 ]; then clang-tidy -p build/linux-cpu-release "${files[@]}"; fi

      - name: ruff
        run: |
          python -m pip install ruff
          ruff check .
          ruff format --check .
