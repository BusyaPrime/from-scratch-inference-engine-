name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux-cpu:
    name: linux-cpu (clang, Release)
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang clang-format clang-tidy ninja-build libopenblas-dev
          clang --version
          cmake --version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure
        run: cmake --preset linux-cpu-release

      - name: Build
        run: cmake --build --preset linux-cpu-release

      - name: C++ tests (ctest)
        run: ctest --preset linux-cpu-release

      - name: Editable install and Python tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest tests/python -m "not parity" -v

      - name: clang-format (check)
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.cc' '*.cxx' '*.h' '*.hpp' '*.cu' '*.cuh')
          if [ "${#files[@]}" -gt 0 ]; then clang-format --dry-run --Werror "${files[@]}"; fi

      - name: clang-tidy (advisory)
        continue-on-error: true
        run: |
          mapfile -t files < <(git ls-files '*.cpp' | grep -E '^(src|bindings|kernels/cpu)/' || true)
          if [ "${#files[@]}" -gt 0 ]; then clang-tidy -p build/linux-cpu-release "${files[@]}"; fi

      - name: ruff
        run: |
          python -m pip install ruff
          ruff check .
          ruff format --check .

  # Non-blocking correctness anchor: runs only on demand, nightly, or with the
  # ci-parity label. Installs torch + transformers and the cached target weights,
  # then checks engine fp32 logits against the transformers oracle.
  parity:
    name: parity (vs transformers, non-blocking)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'ci-parity')
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang ninja-build libopenblas-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache model weights
        uses: actions/cache@v4
        with:
          path: weights
          key: weights-qwen2.5-0.5b-instruct-v1

      - name: Install engine, oracle (CPU torch), and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install transformers

      - name: Fetch weights if not cached
        run: |
          test -f weights/Qwen2.5-0.5B-Instruct/model.safetensors || python scripts/fetch_model.py

      - name: Parity vs transformers
        run: python -m pytest tests/python -m parity -s
